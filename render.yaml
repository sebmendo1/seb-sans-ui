services:
  - type: web
    name: seb-sans-ui
    runtime: python
    buildCommand: npm install && npm run build && pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: ADMIN_PIN
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./data/survey.sqlite3
      - key: SESSION_COOKIE_SECURE
        value: "true"
    disk:
      name: seb-sans-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
